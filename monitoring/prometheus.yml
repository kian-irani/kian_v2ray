global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # Xray exporter (run alongside Xray on each node; exposes traffic metrics).
  - job_name: xray
    static_configs:
      - targets: ["xray-exporter:9550"]

  # The KIAN panel can expose /metrics in a later step.
  - job_name: kian-panel
    metrics_path: /metrics
    static_configs:
      - targets: ["panel:8443"]
