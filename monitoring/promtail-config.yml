# Promtail — ships host + container logs into Loki (phase 7).
server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # System logs under /var/log
  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: varlogs
          host: kian
          __path__: /var/log/*log

  # Docker container logs (json-file driver)
  - job_name: containers
    static_configs:
      - targets: [localhost]
        labels:
          job: containers
          host: kian
          __path__: /var/lib/docker/containers/*/*-json.log
