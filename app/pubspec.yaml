name: kv2m
description: Kv2m — KIAN V2Ray mobile client (same family as the Kv2m desktop app; Android-first, no GMS).
publish_to: "none"
version: 0.1.8+8

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Deliberately GMS-free (Cafe Bazaar / Myket / F-Droid friendly):
  # no firebase, no admob, no google_maps. Push uses SSE/Telegram, not FCM.
  http: ^1.2.0
  shared_preferences: ^2.2.0
  qr_flutter: ^4.1.0          # render config QR
  mobile_scanner: ^5.0.0      # scan sub QR (no GMS dependency)
  intl: ^0.19.0
  dartssh2: ^2.9.0            # SSH into the server to install + manage (C7)
  cryptography: ^2.7.0        # X25519 reality keypair, client-side (C8)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
