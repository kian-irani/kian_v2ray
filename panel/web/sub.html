<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KIAN — اشتراک من</title>
<meta name="color-scheme" content="dark">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0F172A;--surface:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);
        --accent:#22C55E;--danger:#DC2626;--fg:#F8FAFC;--muted:#94A3B8}
  *{box-sizing:border-box}
  body{margin:0;min-height:100dvh;background:
     radial-gradient(900px 500px at 80% -10%,rgba(34,197,94,.12),transparent 60%),var(--bg);
     color:var(--fg);font-family:Vazirmatn,system-ui,sans-serif;display:flex;
     align-items:center;justify-content:center;padding:20px}
  .mono{font-family:'Fira Code',monospace}
  .card{width:100%;max-width:440px;border:1px solid var(--border);border-radius:20px;
        background:var(--surface);backdrop-filter:blur(10px);padding:24px;box-shadow:0 10px 40px rgba(0,0,0,.4)}
  .head{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .logo{width:30px;height:30px;color:var(--accent)}
  h1{font-size:18px;margin:0}
  .name{font-size:22px;font-weight:700;margin:4px 0 2px}
  .status{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:13px;font-weight:600}
  .status.on{background:rgba(34,197,94,.15);color:#86efac}
  .status.off{background:rgba(220,38,38,.15);color:#fca5a5}
  .row{display:flex;justify-content:space-between;margin:14px 0 6px;color:var(--muted);font-size:14px}
  .bar{height:10px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,#22c55e,#16a34a)}
  .meta{display:flex;justify-content:space-between;margin-top:10px;color:var(--muted);font-size:13px}
  .suburl{margin-top:18px}
  .suburl label{font-size:13px;color:var(--muted)}
  .copyrow{display:flex;gap:8px;margin-top:6px}
  .copyrow input{flex:1;background:#0b1426;border:1px solid var(--border);color:var(--fg);
       border-radius:10px;padding:9px 11px;font-size:13px}
  .btn{padding:9px 14px;border-radius:10px;border:1px solid var(--border);
       background:rgba(255,255,255,.06);color:var(--fg);cursor:pointer;font-family:inherit}
  .btn.primary{background:linear-gradient(180deg,#26d266,#16a34a);border-color:transparent;color:#06210f;font-weight:700}
  #qr{display:flex;justify-content:center;margin-top:18px}
  #qr canvas,#qr img{background:#fff;padding:10px;border-radius:12px}
  .err{color:#fca5a5;text-align:center;padding:20px}
  .muted{color:var(--muted)}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="head">
    <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4v5c0 5-3.5 7.5-8 9-4.5-1.5-8-4-8-9V7l8-4z"/><path d="M9 12l2 2 4-4"/></svg>
    <h1>اشتراک من — KIAN</h1>
  </div>
  <div id="body"><p class="muted" style="text-align:center">در حال بارگذاری…</p></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
(function(){
  "use strict";
  var $=function(s){return document.querySelector(s)};
  function gb(b){return (b/1073741824).toFixed(2)}
  function fmtDate(ts){return ts? new Date(ts*1000).toLocaleDateString('fa-IR'):'دائمی'}
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]})}
  var params=new URLSearchParams(location.search);
  var name=params.get('name');
  if(!name){ $('#body').innerHTML='<div class="err">پارامتر name لازم است (مثلاً ?name=ali)</div>'; return; }
  var api=(window.KIAN_API||'').replace(/\/$/,'');
  fetch(api+'/sub/'+encodeURIComponent(name)+'/info').then(function(r){
    if(!r.ok) throw new Error(r.status); return r.json();
  }).then(function(u){
    var pct=u.quota_bytes>0?Math.min(100,u.used_bytes/u.quota_bytes*100):0;
    var quota=u.quota_bytes>0?gb(u.quota_bytes)+' GB':'نامحدود';
    $('#body').innerHTML=
      '<div class="name">'+esc(u.name)+'</div>'+
      '<span class="status '+(u.enabled?'on':'off')+'">'+(u.enabled?'فعال':'غیرفعال')+'</span>'+
      '<div class="row"><span>مصرف</span><span>'+gb(u.used_bytes)+' / '+quota+'</span></div>'+
      '<div class="bar"><i style="width:'+pct+'%"></i></div>'+
      '<div class="meta"><span>انقضا: '+fmtDate(u.expires_at)+'</span></div>'+
      (u.sub_url?(
        '<div class="suburl"><label>لینک Subscription</label>'+
        '<div class="copyrow"><input id="su" readonly value="'+esc(u.sub_url)+'">'+
        '<button class="btn primary" id="cp">کپی</button></div></div>'+
        '<div id="qr"></div>'
      ):'<p class="muted" style="margin-top:16px">لینک Subscription هنوز تنظیم نشده.</p>');
    if(u.sub_url){
      new QRCode($('#qr'),{text:u.sub_url,width:180,height:180,colorDark:'#0F172A',colorLight:'#ffffff'});
      $('#cp').addEventListener('click',function(){
        var i=$('#su'); i.select();
        navigator.clipboard&&navigator.clipboard.writeText(i.value);
        $('#cp').textContent='کپی شد ✓';
      });
    }
  }).catch(function(){
    $('#body').innerHTML='<div class="err">کاربری با این نام یافت نشد.</div>';
  });
})();
</script>
</body>
</html>
