# One-click deploy of the KIAN panel + monitoring stack (phase 7).
#   docker compose up -d
services:
  panel:
    build: .
    image: ghcr.io/kian-irani/kian-panel:latest
    restart: unless-stopped
    environment:
      KIAN_ADMIN_USER: ${KIAN_ADMIN_USER:-admin}
      KIAN_ADMIN_PASSWORD: ${KIAN_ADMIN_PASSWORD:-change-me}
      KIAN_CORS_ORIGINS: ${KIAN_CORS_ORIGINS:-}
    volumes:
      - kian-data:/data
    ports:
      - "8443:8443"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    ports:
      - "9100:9100"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on: [ prometheus, loki ]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

  # Central log aggregation (phase 7 — optional). Loki stores logs; promtail
  # ships the host's journ/syslog + container logs into it. Add Loki as a
  # Grafana datasource (http://loki:3100) to query alongside Prometheus metrics.
  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    depends_on: [ loki ]
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

volumes:
  kian-data:
  grafana-data:
  loki-data:
