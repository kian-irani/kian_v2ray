name: Build Kv2m Desktop (Windows / macOS / Linux)

on:
  push:
    tags: ['kv2m-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'شماره نسخه Desktop (e.g. 3.7.0 — no prefix). Creates tag kv2m-v{version}.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    env:
      INPUT_VERSION: ${{ inputs.version }}
    outputs:
      ver: ${{ steps.v.outputs.ver }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version and tag
        id: v
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VER="$INPUT_VERSION"
            TAG="kv2m-v${VER}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              git tag "$TAG"; git push origin "$TAG"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
            VER="${TAG#kv2m-v}"; VER="${VER#v}"
          fi
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    runs-on: windows-latest
    needs: resolve

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install Python dependencies
        run: pip install PySide6-Essentials paramiko cryptography "qrcode[pil]" Pillow pyinstaller

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build Portable .exe
        shell: pwsh
        run: |
          pyinstaller --onefile --noconsole `
            --name "Kv2m-Portable-x64" `
            --paths kv2m `
            --hidden-import app --hidden-import core --hidden-import theme `
            --hidden-import i18n --hidden-import cli `
            --hidden-import servers --hidden-import settings `
            --hidden-import updater --hidden-import panel_client `
            --hidden-import paramiko --hidden-import cryptography `
            --hidden-import qrcode --hidden-import PIL `
            --exclude-module tkinter --exclude-module matplotlib --exclude-module numpy `
            kv2m/kv2m.py
          echo "✅ Portable: $(Get-Item dist\Kv2m-Portable-x64.exe | Select -Expand Length) bytes"

      - name: Build Setup .exe (NSIS)
        shell: pwsh
        run: |
          Copy-Item dist\Kv2m-Portable-x64.exe kv2m\Kv2m.exe
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) { $nsis = (Get-Command makensis -ErrorAction SilentlyContinue).Source }
          echo "NSIS: $nsis"
          cd kv2m
          & $nsis installer.nsi
          Move-Item Kv2m-Setup-x64.exe ..\dist\
          cd ..
          echo "✅ Setup: $(Get-Item dist\Kv2m-Setup-x64.exe | Select -Expand Length) bytes"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kv2m v${{ needs.resolve.outputs.ver }} — Windows x64"
          tag_name: ${{ needs.resolve.outputs.tag }}
          body: |
            ## Kv2m v${{ needs.resolve.outputs.ver }}

            | فایل | توضیح |
            |------|-------|
            | `Kv2m-Setup-x64.exe` | نصب کامل — Start Menu + Desktop shortcut |
            | `Kv2m-Portable-x64.exe` | بدون نصب — مستقیم اجرا کن |

            **نیاز به Python ندارد. ویندوز ۱۰/۱۱ — ۶۴ بیتی**
          files: |
            dist/Kv2m-Setup-x64.exe
            dist/Kv2m-Portable-x64.exe

  # macOS build — a self-contained .app folder zipped for distribution.
  build-macos:
    runs-on: macos-latest
    needs: resolve
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install PySide6-Essentials paramiko cryptography "qrcode[pil]" Pillow pyinstaller
      - name: Build .app
        run: |
          pyinstaller --windowed --name "Kv2m" \
            --paths kv2m \
            --hidden-import app --hidden-import core --hidden-import theme \
            --hidden-import i18n --hidden-import cli --hidden-import servers \
            --hidden-import settings --hidden-import updater --hidden-import panel_client \
            --hidden-import paramiko --hidden-import cryptography \
            --hidden-import qrcode --hidden-import PIL \
            --exclude-module tkinter --exclude-module matplotlib --exclude-module numpy \
            kv2m/kv2m.py
          cd dist && zip -r -q "Kv2m-macOS.zip" "Kv2m.app" && cd ..
          echo "✅ $(ls -lh dist/Kv2m-macOS.zip)"
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kv2m v${{ needs.resolve.outputs.ver }} — Windows / macOS / Linux"
          tag_name: ${{ needs.resolve.outputs.tag }}
          body: |
            ## Kv2m v${{ needs.resolve.outputs.ver }} — desktop (cross-platform)

            | فایل | پلتفرم |
            |------|--------|
            | `Kv2m-Setup-x64.exe` | Windows — نصبِ کامل |
            | `Kv2m-Portable-x64.exe` | Windows — بدونِ نصب |
            | `Kv2m-macOS.zip` | macOS — `Kv2m.app` (راست‌کلیک → Open بارِ اول) |
            | `Kv2m-Linux-x86_64` | Linux — فایلِ اجراییِ مستقل (`chmod +x`) |

            بدونِ نیاز به Python.
          files: dist/Kv2m-macOS.zip

  # Linux build — a single self-contained executable.
  build-linux:
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system libs for Qt
        run: sudo apt-get update -y && sudo apt-get install -y libegl1 libxkbcommon0 libgl1
      - name: Install deps
        run: pip install PySide6-Essentials paramiko cryptography "qrcode[pil]" Pillow pyinstaller
      - name: Build executable
        run: |
          pyinstaller --onefile --name "Kv2m-Linux-x86_64" \
            --paths kv2m \
            --hidden-import app --hidden-import core --hidden-import theme \
            --hidden-import i18n --hidden-import cli --hidden-import servers \
            --hidden-import settings --hidden-import updater --hidden-import panel_client \
            --hidden-import paramiko --hidden-import cryptography \
            --hidden-import qrcode --hidden-import PIL \
            --exclude-module tkinter --exclude-module matplotlib --exclude-module numpy \
            kv2m/kv2m.py
          echo "✅ $(ls -lh dist/Kv2m-Linux-x86_64)"
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: dist/Kv2m-Linux-x86_64
