name: Build Kv2m Windows

on:
  push:
    tags: ['kv2m-v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install Python dependencies
        run: pip install customtkinter paramiko cryptography "qrcode[pil]" Pillow rich pyinstaller

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build Portable .exe
        shell: pwsh
        run: |
          $ctk = python -c "import customtkinter,os; print(os.path.dirname(customtkinter.__file__))"
          pyinstaller --onefile --noconsole `
            --name "Kv2m-Portable-x64" `
            --add-data "$ctk;customtkinter" `
            --hidden-import customtkinter `
            --hidden-import paramiko `
            --hidden-import cryptography `
            --hidden-import qrcode `
            --hidden-import PIL `
            --exclude-module matplotlib `
            --exclude-module numpy `
            kv2m/kv2m.py
          echo "✅ Portable: $(Get-Item dist\Kv2m-Portable-x64.exe | Select -Expand Length) bytes"

      - name: Build Setup .exe (NSIS)
        shell: pwsh
        run: |
          Copy-Item dist\Kv2m-Portable-x64.exe kv2m\Kv2m.exe
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) { $nsis = (Get-Command makensis -ErrorAction SilentlyContinue).Source }
          echo "NSIS: $nsis"
          cd kv2m
          & $nsis installer.nsi
          Move-Item Kv2m-Setup-x64.exe ..\dist\
          cd ..
          echo "✅ Setup: $(Get-Item dist\Kv2m-Setup-x64.exe | Select -Expand Length) bytes"

      - name: Get version
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace "kv2m-v",""
          echo "VER=$ver" >> $env:GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kv2m v${{ env.VER }} — Windows x64"
          tag_name: ${{ github.ref_name }}
          body: |
            ## Kv2m v${{ env.VER }}

            | فایل | توضیح |
            |------|-------|
            | `Kv2m-Setup-x64.exe` | نصب کامل — Start Menu + Desktop shortcut |
            | `Kv2m-Portable-x64.exe` | بدون نصب — مستقیم اجرا کن |

            **نیاز به Python ندارد. ویندوز ۱۰/۱۱ — ۶۴ بیتی**
          files: |
            dist/Kv2m-Setup-x64.exe
            dist/Kv2m-Portable-x64.exe
