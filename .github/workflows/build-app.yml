name: Build Kv2m Android (manual re-run)

# Use this workflow to re-run the Android build for an existing release.
# Normal releases are triggered via the "Release" workflow (release.yml).
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to re-build (e.g. 4.2.0). Tag v{version} must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.5'

      - name: Prepare clean Android project
        working-directory: app
        run: |
          set -e
          mkdir -p /tmp/vpn
          cp android/app/src/main/AndroidManifest.xml /tmp/vpn/
          cp -r android/app/src/main/kotlin /tmp/vpn/kotlin
          # Preserve custom res resources the manifest references (e.g.
          # res/xml/network_security_config.xml); flutter create won't recreate them.
          [ -d android/app/src/main/res/xml ] && cp -r android/app/src/main/res/xml /tmp/vpn/res-xml || true
          rm -rf android
          flutter create --org com.kianirani --project-name kv2m --platforms=android .
          cp /tmp/vpn/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp -r /tmp/vpn/kotlin/com android/app/src/main/kotlin/
          if [ -d /tmp/vpn/res-xml ]; then
            mkdir -p android/app/src/main/res/xml
            cp -r /tmp/vpn/res-xml/. android/app/src/main/res/xml/
          fi
          props=android/gradle/wrapper/gradle-wrapper.properties
          sed -i -E 's#gradle-[0-9.]+-(all|bin)\.zip#gradle-8.7-all.zip#' "$props"

      - name: Build APKs (universal + per-ABI splits)
        working-directory: app
        run: |
          flutter pub get
          flutter build apk --debug
          flutter build apk --debug --split-per-abi
          ls -lh build/app/outputs/flutter-apk/

      - name: Rename APKs
        working-directory: app
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          ver="$INPUT_VERSION"
          out=build/app/outputs/flutter-apk
          cp "$out/app-debug.apk"             "Kv2m-${ver}-universal.apk"
          [ -f "$out/app-arm64-v8a-debug.apk" ]   && cp "$out/app-arm64-v8a-debug.apk"   "Kv2m-${ver}-arm64.apk"
          [ -f "$out/app-armeabi-v7a-debug.apk" ] && cp "$out/app-armeabi-v7a-debug.apk" "Kv2m-${ver}-arm32.apk"
          ls -lh Kv2m-*.apk

      - name: Upload APKs to existing release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: app/Kv2m-*.apk
