name: Build Kv2m Android
on:
  push:
    tags: ['app-v*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.5'

      - name: Build a clean Android project + overlay our VPN sources
        working-directory: app
        run: |
          set -e
          # 1) stash our VPN-specific sources (manifest + Kotlin channel/service)
          mkdir -p /tmp/vpn
          cp android/app/src/main/AndroidManifest.xml /tmp/vpn/
          cp -r android/app/src/main/kotlin /tmp/vpn/kotlin
          # 2) regenerate a clean, internally-consistent android/ project
          rm -rf android
          flutter create --org com.kianirani --project-name kv2m --platforms=android .
          # 3) overlay our manifest (VpnService) + Kotlin (kv2m/vpn channel)
          cp /tmp/vpn/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp -r /tmp/vpn/kotlin/com android/app/src/main/kotlin/
          # 4) ensure Gradle satisfies the AGP plugin (flutter's wrapper can lag)
          props=android/gradle/wrapper/gradle-wrapper.properties
          sed -i -E 's#gradle-[0-9.]+-(all|bin)\.zip#gradle-8.7-all.zip#' "$props"
          echo "--- gradle wrapper ---"; cat "$props"
          echo "--- kotlin sources ---"; ls -R android/app/src/main/kotlin

      - name: Build debug APK (preview — UI works; native tunnel core pending)
        working-directory: app
        run: |
          flutter pub get
          flutter build apk --debug
          ls -lh build/app/outputs/flutter-apk/

      - name: Rename APK
        working-directory: app
        run: |
          ver="${GITHUB_REF_NAME#app-v}"
          cp build/app/outputs/flutter-apk/app-debug.apk "Kv2m-${ver}-preview.apk"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kv2m Android ${{ github.ref_name }} (preview)"
          tag_name: ${{ github.ref_name }}
          body: |
            ## Kv2m for Android — preview build

            یک نسخهٔ **پیش‌نمایش**: کلِ رابطِ کاربری کار می‌کند (افزودنِ سرور از لینک/QR،
            انتخابِ خودکار، تمِ تیره/روشن، دوزبانه) ولی **هستهٔ تونلِ native (xray-core .aar)
            هنوز bundle نشده** — پس اتصالِ واقعیِ ترافیک در همین build فعال نیست.

            A **preview** build: the full UI works, but the native tunnel core
            (xray-core `.aar`) isn't bundled yet, so real packet forwarding is not
            active in this build. For sideloading/testing only.
          files: app/Kv2m-*-preview.apk
