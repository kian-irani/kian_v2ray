name: Security
on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly Monday 06:00 UTC
permissions:
  contents: read
  security-events: write
jobs:
  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ python, javascript ]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          # NOTE: the input is `languages` (plural). With the wrong key CodeQL
          # auto-detects ALL languages — including the Android Kotlin — and then
          # fails trying to build a Java/Kotlin DB. Pin to interpreted langs only.
          languages: ${{ matrix.language }}
          build-mode: none
      - uses: github/codeql-action/analyze@v3

  trivy-fs:
    name: Trivy (filesystem + config scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy (official script — avoids action-tag drift)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy --version
      - name: Trivy filesystem scan
        run: |
          trivy fs --severity CRITICAL,HIGH --ignore-unfixed --exit-code 0 \
            --no-progress .   # report, don't fail the build (gate later)
