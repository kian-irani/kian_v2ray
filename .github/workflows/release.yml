name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'شماره نسخه — version number (e.g. 4.2.0, no v prefix)'
        required: true
        type: string
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ── 1. Create tag + GitHub Release (changelog notes) ──────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      ver: ${{ steps.tag.outputs.ver }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="$INPUT_VERSION"
            TAG="v${VER}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "⚠️  Tag $TAG already exists — skipping tag creation"
            else
              git tag "$TAG"
              git push origin "$TAG"
              echo "✅ Created and pushed tag $TAG"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build release notes with artifact table
        run: |
          VER="${{ steps.tag.outputs.ver }}"
          awk '/^## /{n++} n==1{print} n==2{exit}' CHANGELOG.md > RELEASE_NOTES.md || true
          cat >> RELEASE_NOTES.md << EOF

---

## دانلود / Download

| فایل / File | پلتفرم / Platform |
|-------------|-------------------|
| \`Kv2m-${VER}-universal.apk\` | 📱 Android — همه گوشی‌ها |
| \`Kv2m-${VER}-arm64.apk\` | 📱 Android — ۶۴ بیتی (گوشی‌های جدید) |
| \`Kv2m-${VER}-arm32.apk\` | 📱 Android — ۳۲ بیتی (گوشی‌های قدیمی) |
| \`Kv2m-Setup-x64.exe\` | 💻 **Windows** 10/11 x64 — نصب کامل |
| \`Kv2m-Portable-x64.exe\` | 💻 **Windows** 10/11 x64 — بدون نصب (Portable) |
| \`Kv2m-macOS.zip\` | 🍎 **macOS** — universal (Intel + Apple Silicon) |
| \`Kv2m-Linux-x86_64\` | 🐧 **Linux** x86_64 — \`chmod +x\` سپس اجرا (glibc ≥ 2.35) |
EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "kian_v2ray ${{ steps.tag.outputs.tag }}"
          body_path: RELEASE_NOTES.md
          generate_release_notes: true

  # ── 2. Android APKs: universal + arm64 + arm32 ───────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.5'

      - name: Prepare clean Android project
        working-directory: app
        run: |
          set -e
          mkdir -p /tmp/vpn
          cp android/app/src/main/AndroidManifest.xml /tmp/vpn/
          cp -r android/app/src/main/kotlin /tmp/vpn/kotlin
          rm -rf android
          flutter create --org com.kianirani --project-name kv2m --platforms=android .
          cp /tmp/vpn/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp -r /tmp/vpn/kotlin/com android/app/src/main/kotlin/
          props=android/gradle/wrapper/gradle-wrapper.properties
          sed -i -E 's#gradle-[0-9.]+-( all|bin)\.zip#gradle-8.7-all.zip#' "$props"
          echo "--- gradle wrapper ---"; cat "$props"

      - name: Build APKs (universal + per-ABI splits)
        working-directory: app
        run: |
          flutter pub get
          flutter build apk --debug
          flutter build apk --debug --split-per-abi
          ls -lh build/app/outputs/flutter-apk/

      - name: Rename APKs
        working-directory: app
        run: |
          ver="${{ needs.create-release.outputs.ver }}"
          out=build/app/outputs/flutter-apk
          cp "$out/app-debug.apk"             "Kv2m-${ver}-universal.apk"
          [ -f "$out/app-arm64-v8a-debug.apk" ]   && cp "$out/app-arm64-v8a-debug.apk"   "Kv2m-${ver}-arm64.apk"
          [ -f "$out/app-armeabi-v7a-debug.apk" ] && cp "$out/app-armeabi-v7a-debug.apk" "Kv2m-${ver}-arm32.apk"
          ls -lh Kv2m-*.apk

      - name: Upload APKs to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: app/Kv2m-*.apk

  # ── 3. Windows x64 — Setup installer + Portable ───────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install Python deps
        run: pip install PySide6-Essentials paramiko cryptography "qrcode[pil]" Pillow pyinstaller

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build Portable .exe
        shell: pwsh
        run: |
          pyinstaller --onefile --noconsole `
            --name "Kv2m-Portable-x64" `
            --paths kv2m `
            --hidden-import app --hidden-import core --hidden-import theme `
            --hidden-import i18n --hidden-import cli `
            --hidden-import servers --hidden-import settings `
            --hidden-import updater --hidden-import panel_client `
            --hidden-import paramiko --hidden-import cryptography `
            --hidden-import qrcode --hidden-import PIL `
            --exclude-module tkinter --exclude-module matplotlib --exclude-module numpy `
            kv2m/kv2m.py
          echo "✅ Portable: $(Get-Item dist\Kv2m-Portable-x64.exe | Select -Expand Length) bytes"

      - name: Build Setup .exe (NSIS)
        shell: pwsh
        run: |
          Copy-Item dist\Kv2m-Portable-x64.exe kv2m\Kv2m.exe
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) { $nsis = (Get-Command makensis -ErrorAction SilentlyContinue).Source }
          echo "NSIS: $nsis"
          cd kv2m
          & $nsis installer.nsi
          Move-Item Kv2m-Setup-x64.exe ..\dist\
          cd ..
          echo "✅ Setup: $(Get-Item dist\Kv2m-Setup-x64.exe | Select -Expand Length) bytes"

      - name: Upload Windows EXEs to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            dist/Kv2m-Setup-x64.exe
            dist/Kv2m-Portable-x64.exe

  # ── 4. macOS — universal2 binary (Intel + Apple Silicon) ───────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python3.11 -m pip install --upgrade pip
          python3.11 -m pip install PySide6-Essentials paramiko cryptography "qrcode[pil]" Pillow pyinstaller

      - name: Build macOS .app
        run: |
          python3.11 -m PyInstaller --windowed --name "Kv2m" \
            --paths kv2m \
            --hidden-import app --hidden-import core --hidden-import theme \
            --hidden-import i18n --hidden-import cli --hidden-import servers \
            --hidden-import settings --hidden-import updater --hidden-import panel_client \
            --hidden-import paramiko --hidden-import cryptography \
            --hidden-import qrcode --hidden-import PIL \
            --exclude-module tkinter --exclude-module matplotlib --exclude-module numpy \
            kv2m/kv2m.py
          cd dist && zip -r -q "Kv2m-macOS.zip" "Kv2m.app" && cd ..
          ls -lh dist/Kv2m-macOS.zip

      - name: Upload macOS app to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: dist/Kv2m-macOS.zip

  # ── 5. Linux x86_64 — broad glibc compatibility (Ubuntu 22.04 / glibc 2.35) ──
  build-linux:
    runs-on: ubuntu-22.04
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system libs for Qt
        run: sudo apt-get update -y && sudo apt-get install -y libegl1 libxkbcommon0 libgl1

      - name: Install Python deps
        run: pip install PySide6-Essentials paramiko cryptography "qrcode[pil]" Pillow pyinstaller

      - name: Build Linux executable
        run: |
          pyinstaller --onefile --name "Kv2m-Linux-x86_64" \
            --paths kv2m \
            --hidden-import app --hidden-import core --hidden-import theme \
            --hidden-import i18n --hidden-import cli --hidden-import servers \
            --hidden-import settings --hidden-import updater --hidden-import panel_client \
            --hidden-import paramiko --hidden-import cryptography \
            --hidden-import qrcode --hidden-import PIL \
            --exclude-module tkinter --exclude-module matplotlib --exclude-module numpy \
            kv2m/kv2m.py
          ls -lh dist/Kv2m-Linux-x86_64

      - name: Upload Linux binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: dist/Kv2m-Linux-x86_64
